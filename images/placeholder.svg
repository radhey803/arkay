<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="Furniture placeholder image">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F5F5DC"/>
      <stop offset="100%" stop-color="#F8F9FA"/>
    </linearGradient>
    <linearGradient id="shape" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#D2691E"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="1200" rx="64" fill="url(#bg)"/>
  <rect x="180" y="360" width="840" height="400" rx="40" fill="url(#shape)" opacity="0.16"/>
  <rect x="260" y="450" width="680" height="220" rx="28" fill="#FFFFFF" opacity="0.9" stroke="#8B4513" stroke-opacity="0.15"/>
  <text x="50%" y="49%" text-anchor="middle" font-family="Poppins, Arial, sans-serif" font-size="54" font-weight="700" fill="#8B4513">Furniture Image</text>
  <text x="50%" y="56%" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="28" fill="#6B7280">Replace with product or showroom photography</text>
</svg>
